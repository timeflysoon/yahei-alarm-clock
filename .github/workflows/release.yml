name: Build and Release Tauri App

on:
  # 仅保留手动触发，彻底关闭代码推送时的自动编译
  workflow_dispatch: 

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装依赖
        run: npm install

      - name: 编译 Tauri 应用
        run: npm run tauri build

      - name: 删除旧 Release
        continue-on-error: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete v1.0.0 --yes --cleanup-tag

      - name: 创建 Release 并上传单文件绿色版
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.0.0 `
            --title "极简雅黑桌面闹钟 (绿色单文件版)" `
            --notes "由 GitHub Actions 自动构建的免安装纯净版本，双击即开。" `
            src-tauri/target/release/yahei-alarm-clock.exe
