<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简雅黑桌面闹钟 - 完美修复版</title>
    <style>
        @font-face {
            font-family: 'DSEG7 Classic';
            src: url('./dseg7-classic.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }
        
        :root {
            --bg-color: #f8f9fa;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --accent-green: #34c759;
            --accent-red: #ff3b30;
            --btn-bg: #f5f5f7;
        }
        body {
            font-family: -apple-system, "Segoe UI", "PingFang SC", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#d1d1d1 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            overflow: auto;
            padding-top: 0;
        }
        .container {
            text-align: center;
            padding: 40px 80px 35px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.05),
                0 10px 30px rgba(0,0,0,0.03),
                0 5px 15px rgba(0,0,0,0.02);
            width: 90%;
            max-width: 1000px;
            height: auto;
            min-height: 300px;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.5);
            box-sizing: border-box;
            margin-top: 5px;
        }
        .time-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            overflow: hidden;
            margin: 0 auto;
        }
        
        #time-display {
            font-family: 'DSEG7 Classic', "Microsoft YaHei", "微软雅黑", sans-serif;
            font-size: 8.5rem;
            font-weight: 400;
            margin: 0;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            color: #000;
            white-space: nowrap;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            font-smooth: never;
            text-rendering: optimizeSpeed;
            text-align: center;
            display: inline-block;
            position: relative;
            left: 0;
            right: 0;
            width: auto;
            max-width: 100%;
        }
        @media (max-width: 768px) {
            #time-display {
                font-size: 14vw;
                letter-spacing: -1px;
                font-family: 'DSEG7 Classic', "Microsoft YaHei", "微软雅黑", sans-serif;
            }
            .container {
                padding: 30px 20px 25px;
                width: 95%;
                height: auto;
                min-height: 100vh;
                margin-top: 5px;
            }
            #date-display {
                font-size: 1.2rem;
                margin-bottom: 30px;
            }
            
            .container .row:nth-child(3) {
                flex-direction: column;
                gap: 10px;
            }
            
            .container .row:nth-child(3) > span:nth-child(1),
            .container .row:nth-child(3) > select:nth-child(2),
            .container .row:nth-child(3) > span:nth-child(3) {
                display: inline-block;
                margin-bottom: 5px;
            }
            
            .container .row:nth-child(3) > select:nth-child(4),
            .container .row:nth-child(3) > span:nth-child(5),
            .container .row:nth-child(3) > select:nth-child(6),
            .container .row:nth-child(3) > span:nth-child(7) {
                display: inline-block;
                margin: 0 2px;
            }
            
            .container .row:nth-child(3) .minute-second-row {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100%;
                margin-top: 5px;
            }
            
            .container .row:nth-child(3) > #note {
                margin-top: 10px;
                width: 90% !important;
                max-width: 300px;
            }
        }
        #date-display {
            font-size: 1.6rem;
            color: var(--text-sub);
            margin-top: 25px;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .settings-panel {
        }
        .row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--text-sub);
            margin-bottom: 20px;
        }
        select, input {
            padding: 12px 18px;
            border-radius: 15px;
            border: 1px solid #d2d2d7;
            background: rgba(255,255,255,0.9);
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s;
        }
        .btn-quick {
            background: var(--btn-bg);
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-quick:hover { background: #e8e8ed; transform: translateY(-2px); }
        
        .btn-main {
            padding: 18px 50px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            position: relative;
            outline: none;
        }
        
        .btn-set {
            background: linear-gradient(145deg, #1a1a1c, #202023);
            color: #fff;
            min-width: 240px;
            box-shadow: 
                0 8px 16px rgba(0, 0, 0, 0.25),
                0 4px 8px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                inset 0 -1px 0 rgba(0, 0, 0, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
        }
        
        .btn-set:hover {
            background: linear-gradient(145deg, #242427, #2b2b2e);
            box-shadow: 
                0 10px 20px rgba(0, 0, 0, 0.3),
                0 6px 12px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                inset 0 -1px 0 rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }
        
        .btn-set:active {
            background: linear-gradient(145deg, #151517, #1a1a1c);
            box-shadow: 
                0 4px 8px rgba(0, 0, 0, 0.25),
                0 2px 4px rgba(0, 0, 0, 0.2),
                inset 0 2px 4px rgba(0, 0, 0, 0.3),
                inset 0 -1px 0 rgba(255, 255, 255, 0.05),
                0 0 0 1px rgba(255, 255, 255, 0.02);
            transform: translateY(1px);
        }
        
        .btn-cancel {
            background: linear-gradient(145deg, #ff453a, #e6392e);
            color: #fff;
            min-width: 240px;
            box-shadow: 
                0 8px 16px rgba(255, 59, 48, 0.25),
                0 4px 8px rgba(220, 40, 30, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                inset 0 -1px 0 rgba(180, 30, 20, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.3);
        }
        
        .btn-cancel:hover {
            background: linear-gradient(145deg, #ff5b52, #ff453a);
            box-shadow: 
                0 10px 20px rgba(255, 59, 48, 0.3),
                0 6px 12px rgba(220, 40, 30, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.25),
                inset 0 -1px 0 rgba(180, 30, 20, 0.35),
                0 0 0 1px rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        .btn-cancel:active {
            background: linear-gradient(145deg, #e6392e, #cc3329);
            box-shadow: 
                0 4px 8px rgba(255, 59, 48, 0.25),
                0 2px 4px rgba(220, 40, 30, 0.2),
                inset 0 2px 4px rgba(180, 30, 20, 0.4),
                inset 0 -1px 0 rgba(255, 255, 255, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            transform: translateY(1px);
        }
        
        .btn-test {
            background: linear-gradient(145deg, #e8f5e9, #d4ecd7);
            color: #1d1d1f;
            border: 1px solid #c1eac5;
            padding: 10px 20px;
            font-size: 1rem;
            margin-top: 0;
            box-shadow: 
                0 6px 12px rgba(67, 199, 89, 0.15),
                0 3px 6px rgba(67, 199, 89, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.8),
                inset 0 -1px 0 rgba(180, 220, 185, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.5);
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.8);
        }
        
        .btn-test:hover {
            background: linear-gradient(145deg, #f0f9f0, #e0f2e3);
            box-shadow: 
                0 8px 16px rgba(67, 199, 89, 0.2),
                0 4px 8px rgba(67, 199, 89, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                inset 0 -1px 0 rgba(180, 220, 185, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.7);
            transform: translateY(-2px);
        }
        
        .btn-test:active {
            background: linear-gradient(145deg, #d4ecd7, #c1eac5);
            box-shadow: 
                0 3px 6px rgba(67, 199, 89, 0.15),
                0 2px 4px rgba(67, 199, 89, 0.1),
                inset 0 2px 4px rgba(160, 210, 165, 0.4),
                inset 0 -1px 0 rgba(255, 255, 255, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.3);
            transform: translateY(1px);
        }
        
        .btn-stop-test {
            background: linear-gradient(145deg, #ffebee, #ffd9d9);
            color: var(--accent-red);
            border: 1px solid #ffcdd2;
            padding: 10px 20px;
            font-size: 1rem;
            margin-top: 0;
            box-shadow: 
                0 6px 12px rgba(255, 59, 48, 0.15),
                0 3px 6px rgba(255, 59, 48, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.8),
                inset 0 -1px 0 rgba(255, 200, 200, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.5);
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.8);
        }
        
        .btn-stop-test:hover {
            background: linear-gradient(145deg, #fff5f5, #ffecec);
            box-shadow: 
                0 8px 16px rgba(255, 59, 48, 0.2),
                0 4px 8px rgba(255, 59, 48, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                inset 0 -1px 0 rgba(255, 200, 200, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.7);
            transform: translateY(-2px);
        }
        
        .btn-stop-test:active {
            background: linear-gradient(145deg, #ffd9d9, #ffcdd2);
            box-shadow: 
                0 3px 6px rgba(255, 59, 48, 0.15),
                0 2px 4px rgba(255, 59, 48, 0.1),
                inset 0 2px 4px rgba(255, 180, 180, 0.4),
                inset 0 -1px 0 rgba(255, 255, 255, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.3);
            transform: translateY(1px);
        }
        
        #status-bar {
            margin-top: 25px;
            color: var(--accent-green);
            font-weight: 500;
            min-height: 28px;
            font-size: 1.3rem;
            margin-bottom: 30px;
        }
        .holiday-footer {
            font-size: 1.2rem;
            color: var(--text-sub);
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
            cursor: pointer;
            user-select: none;
            transition: color 0.3s ease;
            margin-top: 20px;
        }
        .holiday-footer:hover { color: var(--text-main); }
        #holiday-name, #holiday-days { font-family: "Microsoft YaHei"; font-weight: 700; color: var(--text-main); }
        #custom-alert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            padding: 50px 80px;
            border-radius: 40px;
            box-shadow: 0 0 120px rgba(0,0,0,0.15);
            z-index: 100;
            text-align: center;
            border: 1px solid rgba(255, 59, 48, 0.3);
        }
        .ringing-bg { animation: soft-flash 0.8s infinite; }
        @keyframes soft-flash {
            0% { background: var(--bg-color); }
            50% { background: #fff1f0; }
            100% { background: var(--bg-color); }
        }
    </style>
</head>
<body>
<div id="drag-bar" style="
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 40px;
    -webkit-app-region: drag;
    z-index: 999;
"></div>

<button onclick="window.__TAURI__.window.getCurrentWindow().close()" style="
    position: fixed;
    top: 8px; right: 12px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #ff5f57;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: white;
    z-index: 1000;
    line-height: 28px;
">✕</button>

<div id="custom-alert">
    <h1 style="color:var(--accent-red); font-size: 3.5rem; margin: 0 0 15px 0; font-weight: 700;">时间到了</h1>
    <p id="alert-msg-text" style="font-size: 1.8rem; font-weight: 400; margin-bottom: 35px; color: #1d1d1f;"></p>
    <button class="btn-main btn-cancel" onclick="cancelAlarm()">关闭并清除闹钟</button>
</div>
<div class="container" id="clock-box">
    <div class="time-container">
        <div id="time-display">00:00:00</div>
    </div>
    
    <div id="date-display">...</div>
    
    <div class="row">
        <span>设定时间</span>
        <select id="h_sel" onchange="syncManualChange()"></select> 时
        <div class="minute-second-row">
            <select id="m_sel" onchange="syncManualChange()"></select> 分
            <select id="s_sel" onchange="syncManualChange()"></select> 秒
        </div>
        <input type="text" id="note" placeholder="提醒内容 (可选)..." style="width: 220px;">
    </div>
    
    <div class="row">
        <button class="btn-quick" onclick="handleQuickSet(1)">+1分</button>
        <button class="btn-quick" onclick="handleQuickSet(5)">+5分</button>
        <button class="btn-quick" onclick="handleQuickSet(30)">+30分</button>
        <button class="btn-quick" onclick="handleQuickSet(-1)">-1分</button>
        <button class="btn-quick" onclick="handleQuickSet(-5)">-5分</button>
        <button class="btn-quick" onclick="handleQuickSet(-30)">-30分</button>
    </div>
    
    <div class="row">
        <span>提示铃声</span>
        <select id="ring_src" onchange="resetTestBtn()" style="width: 220px">
            <option value="./sounds/song1.mp3">[劲爆] 节奏舞曲</option>
            <option value="./sounds/kanon.mp3">[舒缓] 卡农梦幻</option>
            <option value="./sounds/wind.mp3">[清新] 在角落患过伤风</option>
            <option value="./sounds/march.mp3">[经典] 运动员进行曲</option>
        </select>
        <button class="btn-main btn-test" id="test-btn" onclick="toggleTest()" style="padding: 10px 20px; font-size: 1rem; margin-top:0;">试听</button>
       
        <span style="margin-left:20px">时长</span>
        <select id="duration_sel">
            <option value="60" selected>1分钟</option>
            <option value="0">一直响</option>
        </select>
    </div>
    
    <button class="btn-main btn-set" id="main-btn" onclick="toggleAlarm()">启动闹钟</button>
    
    <div id="status-bar"></div>
    
    <div class="holiday-footer" onclick="switchHoliday()">
        <span id="holiday-icon">🧨</span> <span id="holiday-label">距离</span> <span id="holiday-name">春节</span> <span id="holiday-mid">还有</span> <span id="holiday-days">0</span> <span id="holiday-unit">天</span>
    </div>
</div>
<audio id="audio" loop preload="auto"></audio>

    const hS = document.getElementById('h_sel');
    const mS = document.getElementById('m_sel');
    const sS = document.getElementById('s_sel');
    const audio = document.getElementById('audio');
    const statusBar = document.getElementById('status-bar');
    const mainBtn = document.getElementById('main-btn');
    const noteInput = document.getElementById('note');
   
    let alarmConfig = null;
    let isRinging = false;
    let autoStopTimer = null;
    let currentHolidayIndex = 0;
    
    const holidays = [

        { name: "元宵", icon: "🏮", type: "lunar", dates: ["2026-03-03", "2027-02-20", "2028-02-09", "2029-03-01", "2030-02-17", "2031-02-06", "2032-02-25", "2033-02-14", "2034-03-04", "2035-02-22", "2036-02-11", "2037-03-01", "2038-02-18", "2039-02-07", "2040-02-26", "2041-02-14", "2042-03-05", "2043-02-22", "2044-02-11", "2045-03-02", "2046-02-19", "2047-02-08", "2048-02-27", "2049-02-15", "2050-03-07", "2051-02-24", "2052-02-13", "2053-03-03", "2054-02-21", "2055-02-10", "2056-02-28", "2057-02-17", "2058-02-06", "2059-02-25", "2060-02-14", "2061-03-04", "2062-02-21", "2063-02-10", "2064-02-29", "2065-02-17", "2066-02-06", "2067-02-25", "2068-02-14", "2069-03-04", "2070-02-21", "2071-02-10", "2072-02-28", "2073-02-17", "2074-02-06", "2075-02-25", "2076-02-14", "2077-03-04", "2078-02-21", "2079-02-10", "2080-02-29", "2081-02-18", "2082-02-07", "2083-02-26", "2084-02-15", "2085-02-04", "2086-02-23", "2087-02-12", "2088-03-02", "2089-02-19", "2090-02-08"] },
        { name: "中秋", icon: "🥮", type: "lunar", dates: ["2026-09-25", "2027-09-15", "2028-10-03", "2029-09-22", "2030-09-12", "2031-10-01", "2032-09-19", "2033-09-08", "2034-09-27", "2035-09-16", "2036-10-04", "2037-09-24", "2038-09-13", "2039-10-02", "2040-09-20", "2041-09-09", "2042-09-29", "2043-09-18", "2044-10-06", "2045-09-26", "2046-09-15", "2047-10-04", "2048-09-22", "2049-09-11", "2050-09-30", "2051-09-19", "2052-10-07", "2053-09-27", "2054-09-16", "2055-10-05", "2056-09-24", "2057-09-13", "2058-10-02", "2059-09-21", "2060-09-10", "2061-09-29", "2062-09-18", "2063-10-07", "2064-09-25", "2065-09-15", "2066-10-04", "2067-09-23", "2068-09-12", "2069-10-01", "2070-09-20", "2071-09-09", "2072-09-28", "2073-09-17", "2074-10-06", "2075-09-25", "2076-09-14", "2077-10-03", "2078-09-22", "2079-09-11", "2080-09-30", "2081-09-19", "2082-10-08", "2083-09-27", "2084-09-16", "2085-10-05", "2086-09-24", "2087-09-13", "2088-10-02", "2089-09-21", "2090-09-10"] },
        { name: "元旦", icon: "🥳", month: 1, day: 1 },
        { name: "五一", icon: "🛠️", month: 5, day: 1 },
        { name: "国庆", icon: "🎉", month: 10, day: 1 }
    ];
    
    // 安全的 ISO 日期解析（视为当地时区当天的 00:00:00）
    function parseISODate(str) {
        const [y, m, d] = str.split('-').map(Number);
        return new Date(y, m - 1, d, 0, 0, 0, 0);
    }
    
    // 预解析农历节日日期数组以提高性能
    let parsedHolidays = null;
    
    function init() {
        const populate = (el, max) => {
            for(let i=0; i<=max; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerText = i.toString().padStart(2, '0');
                el.appendChild(opt);
            }
        };
        populate(hS, 23); populate(mS, 59); populate(sS, 59);
        syncSelectorsToNow();
        audio.volume = 1.0;
        
        // 预解析农历节日日期数组
        parsedHolidays = holidays.map(h => {
            if (h.dates) {
                return {
                    ...h,
                    parsedDates: h.dates.map(parseISODate)
                };
            }
            return h;
        });
        
        updateHolidayCountdown();
        update();
    }
    
    function syncSelectorsToNow() {
        const now = new Date();
        hS.value = now.getHours();
        mS.value = now.getMinutes();
        sS.value = now.getSeconds();
    }
    
    // 格式化时间为 HH:MM:SS
    function formatTime(config) {
        return `${config.h.toString().padStart(2, '0')}:${config.m.toString().padStart(2, '0')}:${config.s.toString().padStart(2, '0')}`;
    }
    
    function update() {
        const now = new Date();
        document.getElementById('time-display').innerText = now.toTimeString().split(' ')[0];
        const daysArr = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        document.getElementById('date-display').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${daysArr[now.getDay()]}`;

        // 跨天自动刷新节假日倒计时
        if (now.getHours() === 0 && now.getMinutes() === 0 && now.getSeconds() === 0) {
            updateHolidayCountdown();
        }

        if (alarmConfig && !isRinging) {
            if (now.getHours() == alarmConfig.h && now.getMinutes() == alarmConfig.m && now.getSeconds() == alarmConfig.s) {
                startAlarm();
            } else {
                const nowTotal = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
                const targetTotal = alarmConfig.h * 3600 + alarmConfig.m * 60 + alarmConfig.s;
                let diff = targetTotal - nowTotal;
                if (diff < 0) diff += 86400;
                const h = Math.floor(diff / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
                statusBar.innerText = `距离响铃还剩：${h>0?h+'时':''}${m>0||h>0?m+'分':''}${s}秒`;
                statusBar.style.color = "var(--accent-green)";
            }
        } else if (!alarmConfig && !isRinging) {
            syncSelectorsToNow();
        }
    }
    
    function handleQuickSet(minutes) {
        if (isRinging) return;
        
        // 以 alarmConfig 为唯一真相来源，避免竞争条件
        let h = alarmConfig ? alarmConfig.h : parseInt(hS.value);
        let m = alarmConfig ? alarmConfig.m : parseInt(mS.value);
        let s = alarmConfig ? alarmConfig.s : parseInt(sS.value);
        
        // 计算新的总秒数
        let totalSec = h * 3600 + m * 60 + s + minutes * 60;
        // 处理跨天情况
        if (totalSec < 0) totalSec += 86400;
        if (totalSec >= 86400) totalSec -= 86400;
        
        // 转换回时、分、秒
        h = Math.floor(totalSec / 3600);
        m = Math.floor((totalSec % 3600) / 60);
        s = totalSec % 60;
        
        alarmConfig = { h, m, s };
        // 同步到UI
        hS.value = h; 
        mS.value = m; 
        sS.value = s;
        
        mainBtn.innerText = "取消闹钟"; 
        mainBtn.className = "btn-main btn-cancel";
        update();
    }
    
    function syncManualChange() {
        if (isRinging) return;
        
        alarmConfig = { 
            h: parseInt(hS.value), 
            m: parseInt(mS.value), 
            s: parseInt(sS.value) 
        };
        mainBtn.innerText = "取消闹钟"; 
        mainBtn.className = "btn-main btn-cancel";
        
        // 添加更明确的反馈
        const originalStatus = statusBar.innerText;
        statusBar.innerText = `已设定闹钟 ${formatTime(alarmConfig)}，倒计时更新中...`;
        statusBar.style.color = "var(--accent-green)";
        
        // 短暂显示后更新倒计时
        setTimeout(() => {
            update();
        }, 800);
    }
    
    function toggleAlarm() {
        if (isRinging) { 
            cancelAlarm(); 
            return; 
        }
        if (alarmConfig) { 
            cancelAlarm(); 
        } else {
            alarmConfig = { 
                h: parseInt(hS.value), 
                m: parseInt(mS.value), 
                s: parseInt(sS.value) 
            };
            mainBtn.innerText = "取消闹钟"; 
            mainBtn.className = "btn-main btn-cancel";
            statusBar.innerText = `已设定闹钟 ${formatTime(alarmConfig)}`;
            statusBar.style.color = "var(--accent-green)";
            update();
        }
    }
    
    function startAlarm() {
        isRinging = true;
        audio.src = document.getElementById('ring_src').value;
        audio.loop = true;
        audio.play().then(() => {
            document.body.classList.add('ringing-bg');
            statusBar.innerText = "正在响铃...";
            mainBtn.innerText = "停止响铃"; 
            mainBtn.className = "btn-main btn-cancel";
            const noteText = noteInput.value.trim();
            if (noteText !== "") {
                document.getElementById('alert-msg-text').innerText = noteText;
                document.getElementById('custom-alert').style.display = 'block';
            }
            const duration = parseInt(document.getElementById('duration_sel').value);
            if (duration > 0) {
                autoStopTimer = setTimeout(function() {
                    cancelAlarm();
                    resetTestBtn();
                }, duration * 1000);
            }
        }).catch((e) => {
            statusBar.innerText = "警告：请点击页面激活声音！";
            console.error("音频播放失败:", e);
        });
    }
    
    function cancelAlarm() {
        isRinging = false; 
        alarmConfig = null;
        clearTimeout(autoStopTimer); 
        audio.pause(); 
        audio.currentTime = 0;
        document.body.classList.remove('ringing-bg');
        document.getElementById('custom-alert').style.display = 'none';
        mainBtn.innerText = "启动闹钟"; 
        mainBtn.className = "btn-main btn-set";
        statusBar.innerText = ""; 
        syncSelectorsToNow();
        resetTestBtn();
    }
    
    function resetTestBtn() {
        const btn = document.getElementById('test-btn');
        if (!btn) return;
        
        audio.pause();
        audio.currentTime = 0;
        audio.loop = false;
        
        btn.innerText = "试听";
        btn.className = "btn-main btn-test";
    }
    
    function toggleTest() {
        const btn = document.getElementById('test-btn');
        if (audio.paused || audio.loop) {
            audio.src = document.getElementById('ring_src').value;
            audio.loop = false;
            audio.play().then(() => {
                btn.innerText = "停止";
                btn.className = "btn-main btn-stop-test";
            }).catch((e) => {
                statusBar.innerText = "请点击页面激活声音后试听";
                console.error("试听播放失败:", e);
            });
        } else {
            resetTestBtn();
        }
    }
    
    function renderHoliday(h, days) {
        document.getElementById('holiday-icon').innerText = h.icon;
        const lbl = document.getElementById('holiday-label'), mid = document.getElementById('holiday-mid');
        const unt = document.getElementById('holiday-unit'), nameEl = document.getElementById('holiday-name'), daysEl = document.getElementById('holiday-days');
        daysEl.style.color = "var(--text-main)"; 
        daysEl.style.fontSize = "1.25rem";
        if (days === 0) {
            lbl.innerText = "今天是"; 
            nameEl.innerText = h.name; 
            mid.innerText = ""; 
            unt.innerText = "";
            daysEl.innerText = "🎉 节日快乐"; 
            daysEl.style.color = "var(--accent-green)"; 
            daysEl.style.fontSize = "1.4rem";
            daysEl.style.fontWeight = "700";
            nameEl.style.color = "var(--accent-green)";
            if (!alarmConfig) { 
                statusBar.innerText = `今天是${h.name}，祝您节日快乐！🎉`; 
                statusBar.style.color = "var(--accent-green)"; 
            }
        } else {
            lbl.innerText = "距离"; 
            nameEl.innerText = h.name; 
            mid.innerText = "还有"; 
            daysEl.innerText = days; 
            unt.innerText = "天";
            nameEl.style.color = "var(--text-main)";
        }
    }
    
    // 优化后的天数计算函数（假设输入日期均为当天 00:00:00）
    function calculateDaysBetween(start, end) {
        // 确保两个日期都是北京时间 00:00:00
        const startDate = new Date(start.getFullYear(), start.getMonth(), start.getDate(), 0, 0, 0, 0);
        const endDate = new Date(end.getFullYear(), end.getMonth(), end.getDate(), 0, 0, 0, 0);
        
        // 使用 Math.round 避免浮点数精度问题，符合日常语感
        const diff = Math.round((endDate - startDate) / 86400000);
        
        // 防止意外负值（虽然理论上不会发生）
        return diff < 0 ? 0 : diff;
    }
    
    function updateHolidayCountdown() {
        if (!parsedHolidays) return;
        
        const now = new Date();
        // 创建北京时间今天的00:00:00
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
        
        let minDays = Infinity;
        let bestIdx = 0;
        
        parsedHolidays.forEach((h, i) => {
            let target;
            
            if (h.parsedDates) { 
                // 对于农历节日：使用预解析的日期数组
                target = h.parsedDates.find(d => {
                    // 将比较的日期也转换为北京时间00:00:00以确保一致性
                    const targetDate = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0, 0);
                    return targetDate >= today;
                });
                
                // 如果没找到（今年已过），取明年第一个日期
                if (!target && h.parsedDates.length > 0) {
                    const nextYearDates = h.parsedDates.filter(d => d.getFullYear() > today.getFullYear());
                    if (nextYearDates.length > 0) {
                        target = nextYearDates[0];
                    } else {
                        // 如果还是找不到，取列表中的最后一个日期
                        target = h.parsedDates[h.parsedDates.length - 1];
                    }
                }
            } else {
                // 对于公历节日：创建今年的日期
                target = new Date(now.getFullYear(), h.month - 1, h.day, 0, 0, 0, 0);
                if (today > target) {
                    target = new Date(now.getFullYear() + 1, h.month - 1, h.day, 0, 0, 0, 0);
                }
            }
            
            if (target) {
                // 使用优化后的天数计算函数
                const diff = calculateDaysBetween(today, target);
                if (diff < minDays) { 
                    minDays = diff; 
                    bestIdx = i; 
                }
            }
        });
        
        currentHolidayIndex = bestIdx;
        renderHoliday(parsedHolidays[bestIdx], minDays);
        
        if (minDays === 0) {
            if (!alarmConfig) {
                statusBar.innerText = `今天是${parsedHolidays[bestIdx].name}，祝您节日快乐！🎉`;
                statusBar.style.color = "var(--accent-green)";
            }
        } else if (!alarmConfig) {
            statusBar.innerText = "";
        }
    }
    
    function switchHoliday() {
        if (!parsedHolidays) return;
        
        const now = new Date();
        // 创建北京时间今天的00:00:00
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
        
        currentHolidayIndex = (currentHolidayIndex + 1) % parsedHolidays.length;
        const h = parsedHolidays[currentHolidayIndex];
        
        let target;
        
        if (h.parsedDates) { 
            // 对于农历节日：使用预解析的日期数组
            target = h.parsedDates.find(d => {
                // 将比较的日期也转换为北京时间00:00:00以确保一致性
                const targetDate = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0, 0);
                return targetDate >= today;
            });
            
            // 如果没找到（今年已过），取明年第一个日期
            if (!target && h.parsedDates.length > 0) {
                const nextYearDates = h.parsedDates.filter(d => d.getFullYear() > today.getFullYear());
                if (nextYearDates.length > 0) {
                    target = nextYearDates[0];
                } else {
                    // 如果还是找不到，取列表中的最后一个日期
                    target = h.parsedDates[h.parsedDates.length - 1];
                }
            }
        } else {
            // 对于公历节日：创建今年的日期
            target = new Date(now.getFullYear(), h.month - 1, h.day, 0, 0, 0, 0);
            if (today > target) {
                target = new Date(now.getFullYear() + 1, h.month - 1, h.day, 0, 0, 0, 0);
            }
        }
        
        // 使用优化后的天数计算函数
        const days = target ? calculateDaysBetween(today, target) : 0;
        renderHoliday(h, days);
        
        if (days === 0) {
            if (!alarmConfig) {
                statusBar.innerText = `今天是${h.name}，祝您节日快乐！🎉`;
                statusBar.style.color = "var(--accent-green)";
            }
        } else if (!alarmConfig) {
            statusBar.innerText = "";
        }
    }
    
    init();
    setInterval(update, 1000);
</script>
